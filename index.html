<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="main.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>REST Countries API</title>
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <div class= "logo">
                    <h1 class="logo">Where in the world?</h1>
                </div>
                <div class="nav-right">
                    <button id="dark-mode-btn" class="dark-mode-btn">Dark Mode</button>
                </div>
            </div>
        </nav>
   
    </header>
    <main>
        <div class ="container">
            <div class="search-filter">
                <input type="text" id="search-input" placeholder="Search for a country...">
                <select id="region-filter">
                    <option value="">Filter by Region</option>
                    <option value="Africa">Africa</option>
                    <option value="Americas">Americas</option>
                    <option value="Asia">Asia</option>
                    <option value="Europe">Europe</option>
                    <option value="Oceania">Oceania</option>
                </select>
            </div>
            <div id="countries-container" class="countries-container">
                <!-- Country cards will be dynamically inserted here -->
            </div>



        </div>



    </main>


    
</body>
</html>
